<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Giddies Express — Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gx-orange:#FF6B00;--gx-orange2:#FF8C38;
  --gx-dark:#0A0A0A;--gx-dark2:#111318;--gx-dark3:#1A1D24;--gx-dark4:#22262F;
  --gx-border:#2A2E38;--gx-border2:#353A47;
  --gx-text:#F0F2F7;--gx-text2:#8A8F9E;--gx-text3:#555A68;
  --gx-success:#22C55E;--gx-danger:#EF4444;--gx-warning:#F59E0B;
  --dept:#4ADE80;--dept2:#16A34A;
  --sidebar:240px;--r:12px;
}
html,body{height:100%;font-family:"DM Sans",sans-serif;background:var(--gx-dark);color:var(--gx-text);font-size:14px;overflow-x:hidden}
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--gx-dark2);border-right:1px solid var(--gx-border);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;overflow-y:auto}
.sb-top{padding:1.25rem;border-bottom:1px solid var(--gx-border)}
.sb-logo img{height:38px;width:auto;object-fit:contain;margin-bottom:1rem}
.sb-user{background:var(--gx-dark3);border:1px solid var(--gx-border);border-radius:10px;padding:.75rem;display:flex;align-items:center;gap:.65rem}
.sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--dept2),var(--dept));display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:.82rem;font-weight:600;color:var(--gx-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.sb-urole{font-size:.65rem;color:var(--dept);text-transform:uppercase;letter-spacing:.07em;margin-top:.1rem}
.sb-nav{flex:1;padding:.65rem 0}
.nav-grp{padding:.45rem 1.1rem .2rem;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gx-text3)}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem 1.1rem;color:var(--gx-text2);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.03);color:var(--gx-text)}
.nav-item.active{background:rgba(255,255,255,.05);color:var(--dept);border-left-color:var(--dept)}
.nav-item .ni{font-size:.95rem;width:18px;text-align:center;flex-shrink:0}
.nav-item .nb{margin-left:auto;background:var(--gx-danger);color:#fff;border-radius:100px;font-size:.6rem;font-weight:700;padding:.1rem .4rem;min-width:18px;text-align:center}
.sb-footer{padding:.85rem 1.1rem;border-top:1px solid var(--gx-border)}
.sb-logout{width:100%;display:flex;align-items:center;gap:.6rem;padding:.55rem .85rem;background:transparent;border:1px solid var(--gx-border);border-radius:8px;color:var(--gx-text3);font-size:.78rem;cursor:pointer;transition:all .15s}
.sb-logout:hover{color:var(--gx-text);border-color:var(--gx-border2)}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--gx-dark2);border-bottom:1px solid var(--gx-border);padding:.8rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:.04em}
.topbar-right{display:flex;align-items:center;gap:.65rem}
.dept-badge{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:.3rem .9rem;font-size:.72rem;font-weight:600;color:var(--dept)}
.tb-btn{width:34px;height:34px;border-radius:8px;background:transparent;border:1px solid var(--gx-border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .15s;color:var(--gx-text2);position:relative}
.tb-btn:hover{background:var(--gx-dark3);color:var(--gx-text)}
.tb-btn .dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--gx-danger);border-radius:50%;border:2px solid var(--gx-dark2)}
.content{padding:1.75rem;flex:1}
.card{background:var(--gx-dark2);border:1px solid var(--gx-border);border-radius:var(--r);padding:1.4rem}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.card-title{font-family:"Bebas Neue",sans-serif;font-size:1.1rem;letter-spacing:.04em}
.card-sub{font-size:.72rem;color:var(--gx-text3);margin-top:.1rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--gx-dark2);border:1px solid var(--gx-border);border-radius:var(--r);padding:1.25rem;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.s-dept::before{background:linear-gradient(90deg,var(--dept2),var(--dept))}
.s-green::before{background:linear-gradient(90deg,#16A34A,#4ADE80)}
.s-orange::before{background:linear-gradient(90deg,var(--gx-orange),var(--gx-orange2))}
.s-red::before{background:linear-gradient(90deg,var(--gx-danger),#F87171)}
.s-blue::before{background:linear-gradient(90deg,#1A56DB,#60A5FA)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.85rem}
.sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
.ic-dept{background:rgba(255,255,255,.06)}
.ic-green{background:rgba(34,197,94,.1)} .ic-orange{background:rgba(255,107,0,.12)} .ic-red{background:rgba(239,68,68,.1)} .ic-blue{background:rgba(26,86,219,.12)}
.sc-trend{font-size:.68rem;font-weight:600;padding:.18rem .55rem;border-radius:100px}
.trend-up{background:rgba(34,197,94,.1);color:#4ADE80}
.trend-dn{background:rgba(239,68,68,.1);color:#F87171}
.trend-nt{background:rgba(139,139,139,.1);color:var(--gx-text3)}
.sc-val{font-family:"Bebas Neue",sans-serif;font-size:2.2rem;line-height:1;margin-bottom:.2rem}
.sc-lbl{font-size:.75rem;color:var(--gx-text3)}
.sc-sub{font-size:.72rem;color:var(--gx-text3);margin-top:.35rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.badge{display:inline-flex;align-items:center;padding:.18rem .6rem;border-radius:100px;font-size:.65rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.b-dept{background:rgba(255,255,255,.06);color:var(--dept);border:1px solid rgba(255,255,255,.1)}
.b-green{background:rgba(34,197,94,.1);color:#4ADE80;border:1px solid rgba(34,197,94,.2)}
.b-red{background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.b-orange{background:rgba(255,107,0,.12);color:var(--gx-orange);border:1px solid rgba(255,107,0,.2)}
.b-yellow{background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2)}
.b-blue{background:rgba(26,86,219,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}
.b-gray{background:rgba(139,139,139,.08);color:var(--gx-text2);border:1px solid var(--gx-border)}
.b-purple{background:rgba(124,58,237,.12);color:#A78BFA;border:1px solid rgba(167,139,250,.2)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{padding:.6rem .9rem;text-align:left;font-size:.65rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gx-text3);border-bottom:1px solid var(--gx-border);white-space:nowrap}
tbody td{padding:.78rem .9rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.td-user{display:flex;align-items:center;gap:.6rem}
.td-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.td-acts{display:flex;gap:.35rem;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.8rem;font-weight:600;transition:all .18s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--dept2),var(--dept));color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-danger{background:var(--gx-danger);color:#fff}
.btn-danger:hover{background:#DC2626}
.btn-success{background:var(--gx-success);color:#fff}
.btn-success:hover{background:#16A34A}
.btn-ghost{background:transparent;color:var(--gx-text2);border:1px solid var(--gx-border)}
.btn-ghost:hover{background:var(--gx-dark3);color:var(--gx-text);border-color:var(--gx-border2)}
.btn-sm{padding:.38rem .8rem;font-size:.72rem}
.btn-xs{padding:.25rem .55rem;font-size:.65rem}
.btn-block{width:100%}
.tabs{display:flex;border-bottom:1px solid var(--gx-border);margin-bottom:1.25rem}
.tab{padding:.55rem 1rem;font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--gx-text3);transition:all .15s}
.tab:hover{color:var(--gx-text)}
.tab.active{color:var(--dept);border-bottom-color:var(--dept);font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--gx-dark2);border:1px solid var(--gx-border2);border-radius:16px;padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:scale(.96) translateY(16px);transition:transform .22s;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.04em}
.modal-close{background:none;border:none;color:var(--gx-text3);cursor:pointer;font-size:1.1rem;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--gx-dark3)}
.modal-ft{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid var(--gx-border)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gx-text2);margin-bottom:.4rem}
.field input,.field select,.field textarea{width:100%;padding:.72rem .95rem;background:var(--gx-dark3);border:1.5px solid var(--gx-border);border-radius:9px;font-family:"DM Sans",sans-serif;font-size:.88rem;color:var(--gx-text);outline:none;transition:all .18s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--dept);box-shadow:0 0 0 3px rgba(255,255,255,.05)}
.field textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.progress-bar-bg{background:var(--gx-border);border-radius:100px;height:7px;overflow:hidden;margin-top:.4rem}
.progress-bar-fill{height:7px;border-radius:100px;background:var(--dept);transition:width .5s ease}
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.55rem}
.toast{background:var(--gx-dark3);border:1px solid var(--gx-border2);color:var(--gx-text);padding:.72rem 1.2rem;border-radius:100px;font-size:.8rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateX(110%);transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;display:flex;align-items:center;gap:.55rem}
.toast.show{transform:translateX(0)}
.toast.t-success{border-color:rgba(34,197,94,.3);color:#4ADE80}
.toast.t-error{border-color:rgba(239,68,68,.3);color:#FCA5A5}
.toast.t-warn{border-color:rgba(245,158,11,.3);color:#FCD34D}
.toast.t-info{border-color:rgba(96,165,250,.3);color:#93C5FD}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gx-border2);border-radius:4px}
@media(max-width:1100px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.grid-2,.grid-2-1,.grid-3{grid-template-columns:1fr}}
</style>
</head>

  {id:"messages", icon:"💬",label:"Messages"},
  {id:"notifications",icon:"🔔",label:"Notifications",badge:2},
];
function buildNav(){
  document.getElementById("sbNav").innerHTML=NAV.map(it=>{
    if(it.section) return `<div class="nav-grp">${it.section}</div>`;
    const b=it.badge?`<span class="nb">${it.badge}</span>`:"";
    return `<div class="nav-item" id="ni-${it.id}" onclick="goToPage('${it.id}')"><span class="ni">${it.icon}</span><span>${it.label}</span>${b}</div>`;
  }).join("");
}
const TITLES={dashboard:"Finance Dashboard",budget:"Budget Management",purchases:"Purchase Requests",suppliers:"Supplier Management",payroll:"Send Funds to Payroll",reports:"Financial Reports",messages:"Messages",notifications:"Notifications"};
function goToPage(page){
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  const ni=document.getElementById("ni-"+page);if(ni)ni.classList.add("active");
  document.getElementById("pageTitle").textContent=TITLES[page]||page;
  document.getElementById("mainContent").innerHTML="";
  switch(page){
    case "dashboard":  renderDashboard();break;
    case "budget":     renderBudget();break;
    case "purchases":  renderPurchases();break;
    case "suppliers":  renderSuppliers();break;
    case "payroll":    renderSendPayroll();break;
    case "reports":    renderReports();break;
    default: renderComingSoon(page);
  }
}

function goToLogin(){clearSession();window.location.href='giddyexpress-login.html';}
function toast(msg,type="info"){const w=document.getElementById("toastWrap");const t=document.createElement("div");t.className=`toast t-${type}`;t.textContent=msg;w.appendChild(t);requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),350)},3500);}
buildNav();goToPage("dashboard");

// ── SESSION MANAGEMENT ──
function getSession(){try{return JSON.parse(sessionStorage.getItem('gx_session')||'null');}catch(e){return null;}}
function clearSession(){
  const s=getSession();
  if(s){try{const a=JSON.parse(localStorage.getItem('gx_presence')||'{}');delete a[s.email];localStorage.setItem('gx_presence',JSON.stringify(a));}catch(e){}}
  sessionStorage.removeItem('gx_session');
}
function presenceHeartbeat(){
  const s=getSession();if(!s)return;
  try{const a=JSON.parse(localStorage.getItem('gx_presence')||'{}');a[s.email]={name:s.name,role:s.role,dept:s.dept,ts:Date.now()};localStorage.setItem('gx_presence',JSON.stringify(a));}catch(e){}
  const el=document.getElementById('onlineCount');if(el){try{const a=JSON.parse(localStorage.getItem('gx_presence')||'{}');const n=Object.values(a).filter(v=>Date.now()-v.ts<45000).length;el.textContent=n+' online';}catch(e){}}
}
setInterval(presenceHeartbeat,12000);
presenceHeartbeat();
