<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Giddies Express — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="gx-utils.js"></script>
<script src="gx-email.js"></script>
<script src="gx-auth.js"></script>
<script src="gx-db.js"></script>
<script src="gx-realtime.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#111318;--bg3:#1A1D24;--bg4:#22262F;
  --br:#2A2E38;--br2:#353A47;
  --tx:#F0F2F7;--tx2:#8A8F9E;--tx3:#555A68;
  --ok:#22C55E;--er:#EF4444;--wa:#F59E0B;
  --pu:#A78BFA;--bl:#60A5FA;
}
html,body{min-height:100vh;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx);font-size:14px;overflow-x:hidden}
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sb{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;overflow-y:auto}
.sb-top{padding:1.1rem;border-bottom:1px solid var(--br)}
.sb-logo{height:36px;width:auto;object-fit:contain;display:block;margin-bottom:.9rem}
.sb-user{background:var(--bg3);border:1px solid var(--br);border-radius:9px;padding:.65rem;display:flex;align-items:center;gap:.6rem}
.sb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px}
.sb-role{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;margin-top:.08rem;opacity:.8}
.sb-nav{flex:1;padding:.5rem 0}
.nav-sec{padding:.4rem 1rem .15rem;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3)}
.nav-a{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;color:var(--tx2);font-size:.8rem;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.nav-a:hover{background:rgba(255,255,255,.03);color:var(--tx)}
.nav-a.on{color:var(--hi,var(--tx));border-left-color:var(--hi,var(--tx));background:rgba(255,255,255,.05)}
.nav-a .ic{font-size:.9rem;width:16px;text-align:center;flex-shrink:0}
.nav-a .badge{margin-left:auto;background:var(--er);color:#fff;border-radius:100px;font-size:.58rem;font-weight:700;padding:.08rem .38rem;min-width:16px;text-align:center}
.nav-a .mgr-tag{margin-left:auto;font-size:.55rem;background:rgba(167,139,250,.15);color:var(--pu);padding:.1rem .35rem;border-radius:3px}
.sb-foot{padding:.75rem 1rem;border-top:1px solid var(--br)}
.sb-out{width:100%;display:flex;align-items:center;gap:.55rem;padding:.5rem .8rem;background:transparent;border:1px solid var(--br);border-radius:7px;color:var(--tx3);font-size:.75rem;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .15s}
.sb-out:hover{color:var(--tx);border-color:var(--br2)}

/* TOPBAR */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--br);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.tb-left{display:flex;align-items:center;gap:.75rem}
.tb-title{font-family:"Bebas Neue",sans-serif;font-size:1.3rem;letter-spacing:.04em}
.tb-right{display:flex;align-items:center;gap:.55rem}
.tb-pill{display:flex;align-items:center;gap:.4rem;background:var(--bg3);border:1px solid var(--br);border-radius:100px;padding:.28rem .8rem;font-size:.72rem;font-weight:600;cursor:pointer}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.tb-ic{width:32px;height:32px;border-radius:7px;background:transparent;border:1px solid var(--br);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;color:var(--tx2);position:relative}
.tb-ic:hover{background:var(--bg3);color:var(--tx)}
.tb-ic .red-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;background:var(--er);border-radius:50%;border:2px solid var(--bg2)}
.dept-chip{border-radius:100px;padding:.25rem .8rem;font-size:.7rem;font-weight:700;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05)}
.content{padding:1.5rem;flex:1}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--bg2);border:1px solid var(--br);border-radius:11px;padding:1.15rem;position:relative;overflow:hidden;transition:border-color .2s}
.stat:hover{border-color:var(--br2)}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--hi,#555),var(--hi2,#888))}
.s-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.s-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(255,255,255,.06)}
.s-tr{font-size:.65rem;font-weight:600;padding:.15rem .5rem;border-radius:100px}
.tr-up{background:rgba(34,197,94,.1);color:#4ADE80}
.tr-dn{background:rgba(239,68,68,.1);color:#F87171}
.tr-nt{background:rgba(139,139,139,.1);color:var(--tx3)}
.s-val{font-family:"Bebas Neue",sans-serif;font-size:2rem;line-height:1;margin-bottom:.18rem}
.s-lbl{font-size:.72rem;color:var(--tx3)}
.s-sub{font-size:.68rem;color:var(--tx3);margin-top:.3rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.15rem;margin-bottom:1.15rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.15rem;margin-bottom:1.15rem}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:1.15rem;margin-bottom:1.15rem}
.g12{display:grid;grid-template-columns:1fr 2fr;gap:1.15rem;margin-bottom:1.15rem}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:11px;padding:1.3rem}
.c-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.c-title{font-family:"Bebas Neue",sans-serif;font-size:1.05rem;letter-spacing:.04em}
.c-sub{font-size:.7rem;color:var(--tx3);margin-top:.08rem}

/* BADGES */
.b{display:inline-flex;align-items:center;padding:.16rem .55rem;border-radius:100px;font-size:.63rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
.b-ok{background:rgba(34,197,94,.1);color:#4ADE80;border-color:rgba(34,197,94,.2)}
.b-er{background:rgba(239,68,68,.1);color:#F87171;border-color:rgba(239,68,68,.2)}
.b-wa{background:rgba(245,158,11,.1);color:#FCD34D;border-color:rgba(245,158,11,.2)}
.b-bl{background:rgba(96,165,250,.1);color:#60A5FA;border-color:rgba(96,165,250,.2)}
.b-pu{background:rgba(167,139,250,.1);color:#A78BFA;border-color:rgba(167,139,250,.2)}
.b-or{background:rgba(255,107,0,.1);color:#FF6B00;border-color:rgba(255,107,0,.2)}
.b-gy{background:rgba(139,139,139,.08);color:var(--tx2);border-color:var(--br)}
.b-te{background:rgba(45,212,191,.1);color:#2DD4BF;border-color:rgba(45,212,191,.2)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{padding:.55rem .85rem;text-align:left;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--br)}
tbody td{padding:.72rem .85rem;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.td-user{display:flex;align-items:center;gap:.55rem}
.td-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#fff;flex-shrink:0}
.td-acts{display:flex;gap:.3rem;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.38rem;padding:.55rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;font-size:.78rem;font-weight:600;transition:all .18s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-hi{background:linear-gradient(135deg,var(--hi,#FF6B00),var(--hi2,#FF8C38));color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.btn-hi:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-ok{background:var(--ok);color:#fff}
.btn-ok:hover{background:#16A34A}
.btn-er{background:var(--er);color:#fff}
.btn-er:hover{background:#DC2626}
.btn-gh{background:transparent;color:var(--tx2);border:1px solid var(--br)}
.btn-gh:hover{background:var(--bg3);color:var(--tx);border-color:var(--br2)}
.btn-sm{padding:.32rem .75rem;font-size:.7rem}
.btn-xs{padding:.22rem .5rem;font-size:.62rem}
.btn-bl{width:100%}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--br);margin-bottom:1.1rem;gap:0}
.tab{padding:.5rem .95rem;font-size:.78rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--tx3);transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--hi,#60A5FA);border-bottom-color:var(--hi,#60A5FA);font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--br2);border-radius:14px;padding:1.6rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;transform:scale(.95) translateY(12px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay.open .modal{transform:scale(1) translateY(0)}
.m-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.m-title{font-family:"Bebas Neue",sans-serif;font-size:1.25rem;letter-spacing:.04em}
.m-x{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:1rem;width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.m-x:hover{background:var(--bg3);color:var(--tx)}
.m-ft{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--br)}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx2);margin-bottom:.35rem}
.field input,.field select,.field textarea{width:100%;padding:.68rem .9rem;background:var(--bg3);border:1.5px solid var(--br);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:.85rem;color:var(--tx);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--hi,#60A5FA)}
.field textarea{resize:vertical;min-height:75px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}

/* APPROVAL ITEM */
.appr-row{background:var(--bg3);border:1px solid var(--br);border-radius:9px;padding:.9rem 1rem;margin-bottom:.55rem;display:flex;align-items:center;gap:.75rem;transition:border-color .15s}
.appr-row:hover{border-color:var(--br2)}
.appr-ic{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.appr-info{flex:1;min-width:0}
.appr-title{font-weight:600;font-size:.83rem;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appr-meta{font-size:.7rem;color:var(--tx3)}
.appr-acts{display:flex;gap:.35rem;flex-shrink:0}

/* ACTIVITY */
.act-row{display:flex;gap:.7rem;padding:.68rem 0;border-bottom:1px solid rgba(255,255,255,.03)}
.act-row:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:.38rem}
.act-body{flex:1}
.act-text{font-size:.8rem;color:var(--tx2);line-height:1.5}
.act-text strong{color:var(--tx);font-weight:600}
.act-time{font-size:.66rem;color:var(--tx3);margin-top:.15rem}

/* CHART */
.bars{display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:.25rem}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s ease}
.bar-lbl{font-size:.6rem;color:var(--tx3)}

/* PROGRESS BAR */
.prog-bg{background:var(--br);border-radius:100px;overflow:hidden}
.prog-fill{border-radius:100px;transition:width .5s ease}

/* CHAT */
.chat-wrap{display:grid;grid-template-columns:210px 1fr;height:calc(100vh - 120px);background:var(--bg2);border:1px solid var(--br);border-radius:11px;overflow:hidden}
.chat-list{border-right:1px solid var(--br);display:flex;flex-direction:column;overflow-y:auto}
.chat-hdr{padding:.85rem 1rem;border-bottom:1px solid var(--br);font-family:"Bebas Neue",sans-serif;font-size:.95rem;letter-spacing:.04em}
.chat-contact{padding:.65rem .9rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.chat-contact:hover{background:rgba(255,255,255,.03)}
.chat-contact.on{background:rgba(255,255,255,.05);border-left:3px solid var(--hi,#60A5FA)}
.chat-main{display:flex;flex-direction:column}
.chat-top{padding:.85rem 1.1rem;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:.7rem}
.chat-msgs{flex:1;overflow-y:auto;padding:1.1rem;background:var(--bg);display:flex;flex-direction:column;gap:.65rem}
.msg{display:flex;gap:.5rem;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.msg-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0}
.msg-bub{max-width:60%;padding:.55rem .8rem;border-radius:11px;font-size:.82rem;line-height:1.5}
.msg-bub.their{background:var(--bg2);border:1px solid var(--br);border-bottom-left-radius:3px}
.msg-bub.mine{background:linear-gradient(135deg,var(--hi2,#1A56DB),var(--hi,#60A5FA));color:#fff;border-bottom-right-radius:3px}
.msg-ts{font-size:.6rem;color:var(--tx3);margin-top:.18rem}
.msg.me .msg-ts{text-align:right}
.chat-inp{padding:.8rem 1.1rem;border-top:1px solid var(--br);display:flex;gap:.6rem;background:var(--bg2)}
.chat-input{flex:1;padding:.6rem .9rem;background:var(--bg3);border:1.5px solid var(--br);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:.83rem;color:var(--tx);outline:none;transition:border-color .15s;resize:none}
.chat-input:focus{border-color:var(--hi,#60A5FA)}

/* TOAST */
.toast-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--br2);color:var(--tx);padding:.68rem 1.1rem;border-radius:100px;font-size:.78rem;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.4);transform:translateX(110%);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(0)}
.toast.ok{border-color:rgba(34,197,94,.3);color:#4ADE80}
.toast.er{border-color:rgba(239,68,68,.3);color:#FCA5A5}
.toast.wa{border-color:rgba(245,158,11,.3);color:#FCD34D}
.toast.in{border-color:rgba(96,165,250,.3);color:#93C5FD}

/* ANNOUNCEMENT */
.ann{border-radius:9px;padding:.9rem 1rem;margin-bottom:.6rem;border-left:4px solid}
.ann-info{border-left-color:#60A5FA;background:rgba(26,86,219,.06)}
.ann-warn{border-left-color:#F59E0B;background:rgba(245,158,11,.06)}
.ann-ok{border-left-color:#22C55E;background:rgba(34,197,94,.06)}
.ann-title{font-weight:700;font-size:.86rem;margin-bottom:.28rem}
.ann-body{font-size:.8rem;color:var(--tx2);line-height:1.55}
.ann-ft{display:flex;align-items:center;justify-content:space-between;margin-top:.6rem}
.react-btn{background:var(--bg3);border:1px solid var(--br);border-radius:100px;padding:.18rem .55rem;font-size:.72rem;cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif}
.react-btn:hover,.react-btn.reacted{background:rgba(255,107,0,.1);border-color:rgba(255,107,0,.3);color:#FF6B00}

/* LEAVE BALANCE */
.leave-card{background:var(--bg3);border:1px solid var(--br);border-radius:9px;padding:1rem}
.leave-card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.leave-days{font-family:"Bebas Neue",sans-serif;font-size:1.55rem;color:var(--hi,#60A5FA)}

/* ATTENDANCE */
.att-week{display:grid;grid-template-columns:repeat(7,1fr);gap:.45rem}
.att-day{background:var(--bg3);border:1px solid var(--br);border-radius:7px;padding:.55rem;text-align:center}
.att-day.present{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.05)}
.att-day.late{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.05)}
.att-day.absent{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.04)}
.att-day.wknd{opacity:.3}
.att-day-name{font-size:.62rem;color:var(--tx3);margin-bottom:.22rem}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
.k-col{background:var(--bg3);border-radius:9px;padding:.8rem}
.k-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.k-card{background:var(--bg2);border:1px solid var(--br);border-radius:7px;padding:.85rem;margin-bottom:.5rem;cursor:pointer;transition:border-color .15s}
.k-card:hover{border-color:var(--br2)}

/* INFO BOX */
.info-box{border-radius:9px;padding:.85rem 1rem;font-size:.8rem;line-height:1.6;margin:.7rem 0}
.info-blue{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.2);color:#93C5FD}
.info-orange{background:rgba(255,107,0,.06);border:1px solid rgba(255,107,0,.2);color:#FDBA74}
.info-green{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);color:#4ADE80}
.info-red{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#FCA5A5}
.info-purple{background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);color:#C4B5FD}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:4px}

/* RESPONSIVE */
@media(max-width:1100px){.stats{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sb{transform:translateX(-100%)}.main{margin-left:0}.g2,.g21,.g12,.g3{grid-template-columns:1fr}.chat-wrap{grid-template-columns:1fr}}

:root{--hi:#F59E0B;--hi2:#FBBF24;}

</style>
</head>
<body>

<div class="shell">

function goToPage(id){

  switch(id){
    case 'dashboard':    renderDashboard(); break;

    case 'employees':    renderEmployees(); break;

function filterApprovals(type){
  const list = type==='all' ? APPROVALS : APPROVALS.filter(a=>a.type===type);
  const el=document.getElementById('apprFull');
  if(el) el.innerHTML = list.length ? renderApprovalItems(list) : '<div style="text-align:center;padding:2rem;color:var(--tx3)">No items in this filter.</div>';
}
function approveItem(id){
  APPROVALS = APPROVALS.filter(a=>a.id!==id);
  const el=document.getElementById('appr-'+id);
  if(el){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);}
  toast('✅ Approved — forwarded to record','ok');
}
function rejectItem(id){
  APPROVALS = APPROVALS.filter(a=>a.id!==id);
  const el=document.getElementById('appr-'+id);
  if(el){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);}
  toast('❌ Rejected — requester notified','in');
}
function approveAll(){
  APPROVALS=[];
  const el=document.getElementById('apprFull')||document.getElementById('apprList');
  if(el) el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--tx3)">All approvals processed ✅</div>';

}

// ── INIT ──
// Wait for all external scripts to load before initialising
function startApp() {
  if (typeof GXAuth === 'undefined') {
    setTimeout(startApp, 50);
    return;
  }
  // Check session - if no session, stay on page in demo mode
  const sess = GXAuth.getSession();
  if (!sess) {
    // No session - still render dashboard in demo mode
    if (typeof buildNav === 'function') buildNav();
    if (typeof goToPage === 'function') goToPage('dashboard');
    startClock();
    return;
  }
  initPage({nav:true, page:'dashboard'});
}

</script>

<div class="toast-wrap" id="toastWrap"></div>
<script>

// ════════════════════════════════════════
//  SHARED JS — GiddyExpress Portal
//  All utilities available on every page
// ════════════════════════════════════════

// ── SESSIONS ──
function getSession(){
  try{return JSON.parse(sessionStorage.getItem('gx_session')||'null');}
  catch(e){return null;}
}
function setSession(u){
  sessionStorage.setItem('gx_session',JSON.stringify({...u,loginTime:Date.now()}));
  _presenceSet(u);
}
function clearSession(){
  const s=getSession();
  if(s) _presenceDel(s.email);
  sessionStorage.removeItem('gx_session');
}
function requireAuth(roles){
  const s=getSession();
  if(!s){location.href='giddyexpress-login.html';return null;}
  if(roles&&!roles.includes(s.role)){location.href='giddyexpress-login.html';return null;}
  return s;
}
function goToLogin(){clearSession();location.href='giddyexpress-login.html';}

// ── PRESENCE ──
function _presenceSet(u){
  try{const p=JSON.parse(localStorage.getItem('gx_presence')||'{}');
    p[u.email]={name:u.name,role:u.role,dept:u.dept||u.department||'',ts:Date.now()};
    localStorage.setItem('gx_presence',JSON.stringify(p));}catch(e){}
}
function _presenceDel(email){
  try{const p=JSON.parse(localStorage.getItem('gx_presence')||'{}');
    delete p[email];localStorage.setItem('gx_presence',JSON.stringify(p));}catch(e){}
}
function getOnline(){
  try{const p=JSON.parse(localStorage.getItem('gx_presence')||'{}');
    return Object.values(p).filter(v=>Date.now()-v.ts<45000);}
  catch(e){return[];}
}
function startPresence(){
  const s=getSession();if(!s)return;
  _presenceSet(s);
  setInterval(()=>{
    const ss=getSession();if(!ss)return;
    _presenceSet(ss);
    const el=document.getElementById('onlineCount');
    if(el)el.textContent=getOnline().length+' online';
  },12000);
}

// ── MODALS (works everywhere) ──
function openModal(id){
  const el=document.getElementById(id);
  if(el)el.classList.add('open');
  else console.warn('Modal not found:',id);
}
function closeModal(id){
  const el=document.getElementById(id);
  if(el)el.classList.remove('open');
}
// Close modal on overlay click
document.addEventListener('click',function(e){
  if(e.target&&e.target.classList.contains('overlay')){
    e.target.classList.remove('open');
  }
});

// ── TABS ──
function setTab(btn,groupClass){
  // btn = clicked element, groupClass = parent selector
  const parent=btn.closest(groupClass||'.tabs');
  if(!parent)return;
  parent.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
}

// ── TOAST ──
function toast(msg,type){
  type=type||'in';
  let w=document.getElementById('toastWrap');
  if(!w){w=document.createElement('div');w.id='toastWrap';w.className='toast-wrap';document.body.appendChild(w);}
  const t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  w.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3500);
}

// ── CLOCK ──
function startClock(elId){
  const id=elId||'tbClock';
  function tick(){
    const el=document.getElementById(id);
    if(!el)return;
    const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
    el.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  }
  tick();setInterval(tick,1000);
}

// ── WORK HOURS ──
function getWorkCfg(){
  try{return JSON.parse(localStorage.getItem('gx_work')||'{"start":"08:00","end":"17:00","weekend":"locked"}');}
  catch(e){return{start:'08:00',end:'17:00',weekend:'locked'};}
}
function isPortalOpen(){
  const cfg=getWorkCfg();
  const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
  const day=n.getDay();
  if((day===0||day===6)&&cfg.weekend==='locked')return false;
  const [sh,sm]=cfg.start.split(':').map(Number);
  const [eh,em]=cfg.end.split(':').map(Number);
  const now=n.getHours()*60+n.getMinutes();
  return now>=sh*60+sm&&now<eh*60+em;
}
function startWorkHoursCheck(role){
  if(role==='admin'||role==='manager')return;
  setInterval(()=>{
    const cfg=getWorkCfg();
    const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));
    const [eh,em]=cfg.end.split(':').map(Number);
    const nowM=n.getHours()*60+n.getMinutes();
    const endM=eh*60+em;
    const left=endM-nowM;
    if([30,15,5,1].includes(left)&&n.getSeconds()<5)
      toast('⏰ Portal closes in '+left+' min! Save your work.','wa');
    if(nowM>=endM&&n.getSeconds()<5){
      toast('Portal has closed. Logging you out...','wa');
      setTimeout(goToLogin,2000);
    }
  },5000);
}

// ── INIT PAGE (call on every dashboard page) ──
function initPage(opts){
  opts=opts||{};
  // Build nav
  if(opts.nav&&typeof buildNav==='function')buildNav();
  // Start default page
  if(opts.page&&typeof goToPage==='function')goToPage(opts.page);
  // Start clock
  startClock();
  // Start presence
  startPresence();
  // Work hours check
  const s=getSession();
  if(s&&s.role)startWorkHoursCheck(s.role);
  // Update online count
  const el=document.getElementById('onlineCount');
  if(el)el.textContent=getOnline().length+' online';
}

</script>
