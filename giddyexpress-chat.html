<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Giddies Express - Chat & Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0F14;--bg2:#161920;--bg3:#1E2128;--bg4:#252830;--br:rgba(255,255,255,.07);--tx:#E8EAF0;--tx2:#9CA3AF;--tx3:#6B7280;--hi:#FF6B00;--hi2:#FF8C38;--ok:#4ADE80;--er:#F87171;--wa:#FCD34D;--bl:#60A5FA;--pu:#A78BFA;--or:#FB923C}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}
.sb{width:220px;background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:1.1rem 1.1rem .7rem;border-bottom:1px solid var(--br)}
.sb-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;color:var(--hi)}
.sb-sub{font-size:.52rem;color:var(--tx3);letter-spacing:.18em;text-transform:uppercase}
.sb-user{display:flex;align-items:center;gap:.6rem;padding:.75rem 1.1rem;border-bottom:1px solid var(--br)}
.sb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-nm{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-rl{font-size:.62rem;color:var(--tx3)}
.sb-nav{flex:1;overflow-y:auto;padding:.4rem 0}
.nav-sec{font-size:.6rem;font-weight:600;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;padding:.75rem 1.1rem .25rem}
.nav-a{display:flex;align-items:center;gap:.6rem;padding:.55rem 1.1rem;cursor:pointer;font-size:.8rem;color:var(--tx2);transition:all .15s;position:relative}
.nav-a:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.nav-a.on{background:rgba(255,107,0,.1);color:var(--hi)}
.nav-a.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--hi);border-radius:0 2px 2px 0}
.nav-ic{width:15px;text-align:center;font-size:.85rem;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--er);color:#fff;border-radius:100px;font-size:.58rem;font-weight:700;padding:.1rem .35rem;min-width:16px;text-align:center}
.sb-foot{padding:.75rem 1.1rem;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:.4rem}
.btn-back{background:var(--bg3);border:1px solid var(--br);color:var(--tx2);border-radius:8px;padding:.45rem;font-size:.74rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center}
.btn-back:hover{border-color:var(--hi);color:var(--hi)}
.btn-logout{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#F87171;border-radius:8px;padding:.45rem;font-size:.74rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-logout:hover{background:rgba(239,68,68,.2)}
.main{flex:1;display:flex;overflow:hidden}
.panel-left{width:280px;border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg2)}
.panel-hd{padding:.85rem 1rem;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.panel-title{font-weight:600;font-size:.88rem}
.panel-search{padding:.6rem .8rem;border-bottom:1px solid var(--br)}
.panel-search input{width:100%;background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:.45rem .7rem;color:var(--tx);font-size:.78rem;font-family:'DM Sans',sans-serif;outline:none}
.panel-search input:focus{border-color:var(--hi)}
.panel-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.conv-item:hover{background:rgba(255,255,255,.03)}
.conv-item.active{background:rgba(255,107,0,.08);border-left:3px solid var(--hi)}
.conv-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.conv-av.group{border-radius:10px;font-size:.9rem}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:.7rem;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.2rem;flex-shrink:0}
.conv-time{font-size:.62rem;color:var(--tx3)}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--hi)}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-hd{padding:.85rem 1.2rem;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:.75rem;background:var(--bg2)}
.chat-hd-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
.chat-hd-name{font-weight:600;font-size:.9rem}
.chat-hd-sub{font-size:.7rem;color:var(--tx3);margin-top:.05rem}
.chat-hd-acts{margin-left:auto;display:flex;gap:.4rem}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.4rem}
.msg-row{display:flex;gap:.6rem;max-width:72%;align-items:flex-end}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-av-sm{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0;margin-bottom:2px}
.msg-bubble{background:var(--bg3);border-radius:12px 12px 12px 3px;padding:.55rem .85rem;max-width:100%;word-break:break-word}
.msg-row.mine .msg-bubble{background:rgba(255,107,0,.18);border-radius:12px 12px 3px 12px;border:1px solid rgba(255,107,0,.25)}
.msg-sender{font-size:.64rem;font-weight:600;margin-bottom:.2rem;color:var(--tx3)}
.msg-text{font-size:.82rem;line-height:1.5;color:var(--tx)}
.msg-time{font-size:.6rem;color:var(--tx3);margin-top:.3rem;text-align:right}
.msg-file{display:flex;align-items:center;gap:.6rem;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:8px;padding:.5rem .75rem;cursor:pointer;transition:all .2s;text-decoration:none}
.msg-file:hover{border-color:var(--hi);background:rgba(255,107,0,.08)}
.msg-file-ic{font-size:1.4rem;flex-shrink:0}
.msg-file-info{flex:1;min-width:0}
.msg-file-name{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)}
.msg-file-size{font-size:.65rem;color:var(--tx3)}
.msg-deleted{font-size:.75rem;color:var(--tx3);font-style:italic}
.msg-date-sep{text-align:center;font-size:.65rem;color:var(--tx3);padding:.5rem 0;position:relative}
.msg-date-sep::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.05)}
.msg-date-sep span{background:var(--bg);padding:0 .75rem;position:relative;z-index:1}
.chat-input{padding:.85rem 1.2rem;border-top:1px solid var(--br);background:var(--bg2)}
.input-file-preview{display:flex;align-items:center;gap:.5rem;background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.2);border-radius:8px;padding:.45rem .75rem;margin-bottom:.5rem;font-size:.75rem}
.input-file-preview .rm{cursor:pointer;color:var(--er);margin-left:auto;font-size:.85rem}
.input-row{display:flex;align-items:center;gap:.5rem}
.input-row input[type=text],
.input-row textarea{flex:1;background:var(--bg3);border:1px solid var(--br);border-radius:10px;padding:.6rem .9rem;color:var(--tx);font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none;resize:none;max-height:100px;min-height:40px}
.input-row input[type=text]:focus,
.input-row textarea:focus{border-color:var(--hi)}
.ic-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--br);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--tx2);transition:all .2s;flex-shrink:0}
.ic-btn:hover{border-color:var(--hi);color:var(--hi)}
.ic-btn.send{background:var(--hi);border-color:var(--hi);color:#fff}
.ic-btn.send:hover{background:var(--hi2)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx3);gap:1rem}
.empty-ic{font-size:3.5rem;opacity:.3}
.empty-title{font-size:1rem;font-weight:600;color:var(--tx2)}
.empty-sub{font-size:.78rem;text-align:center;max-width:240px;line-height:1.5}
.mail-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mail-list{flex:1;overflow-y:auto}
.mail-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s}
.mail-item:hover{background:rgba(255,255,255,.03)}
.mail-item.active{background:rgba(255,107,0,.08)}
.mail-item.unread .mail-subj{font-weight:700;color:var(--tx)}
.mail-item.unread{background:rgba(255,255,255,.02)}
.mail-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
.mail-info{flex:1;min-width:0}
.mail-from{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-subj{font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx2);margin-top:.1rem}
.mail-preview{font-size:.68rem;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem}
.mail-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.mail-time{font-size:.62rem;color:var(--tx3)}
.star{font-size:.85rem;cursor:pointer;transition:color .15s}
.star.on{color:var(--wa)}
.star.off{color:var(--tx3)}
.mail-detail{flex:1;overflow-y:auto;padding:1.5rem}
.mail-detail-hd{margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--br)}
.mail-detail-subj{font-size:1.1rem;font-weight:700;margin-bottom:.75rem}
.mail-detail-meta{display:flex;align-items:center;gap:.75rem}
.mail-detail-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0}
.mail-detail-from{flex:1}
.mail-detail-name{font-size:.85rem;font-weight:600}
.mail-detail-to{font-size:.72rem;color:var(--tx3);margin-top:.1rem}
.mail-detail-time{font-size:.7rem;color:var(--tx3)}
.mail-detail-body{font-size:.85rem;line-height:1.7;color:var(--tx2);margin:.5rem 0 1rem;white-space:pre-wrap}
.mail-detail-attach{display:flex;align-items:center;gap:.65rem;background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:.6rem .9rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;margin-top:.5rem}
.mail-detail-attach:hover{border-color:var(--hi)}
.mail-actions{display:flex;gap:.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--br)}
.btn{border-radius:8px;padding:.42rem .85rem;font-size:.76rem;font-weight:500;cursor:pointer;border:1px solid transparent;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:.3rem}
.btn-hi{background:var(--hi);color:#fff;border-color:var(--hi)}.btn-hi:hover{background:var(--hi2)}
.btn-gh{background:var(--bg3);color:var(--tx2);border-color:var(--br)}.btn-gh:hover{border-color:var(--hi);color:var(--hi)}
.btn-er{background:rgba(239,68,68,.15);color:var(--er);border-color:rgba(239,68,68,.3)}
.btn-sm{padding:.28rem .6rem;font-size:.7rem}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--br);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.m-hd{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem;border-bottom:1px solid var(--br)}
.m-title{font-weight:700;font-size:.9rem}
.m-x{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:1rem;padding:.2rem}
.m-x:hover{color:var(--er)}
.m-body{padding:1rem 1.2rem}
.m-ft{padding:.75rem 1.2rem;border-top:1px solid var(--br);display:flex;gap:.5rem;justify-content:flex-end}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.72rem;color:var(--tx3);margin-bottom:.3rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.field input,.field textarea,.field select{width:100%;background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:.55rem .75rem;color:var(--tx);font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--hi)}
.field textarea{resize:vertical;min-height:80px}
.field select{appearance:none}
.new-btn{background:var(--hi);color:#fff;border:none;border-radius:8px;padding:.42rem .8rem;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:.3rem}
.new-btn:hover{background:var(--hi2)}
.emp-picker{display:flex;flex-wrap:wrap;gap:.35rem;padding:.4rem 0}
.emp-chip{display:flex;align-items:center;gap:.35rem;background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.3);border-radius:100px;padding:.2rem .6rem .2rem .4rem;font-size:.72rem}
.emp-chip-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;color:#fff}
.emp-chip-rm{cursor:pointer;color:var(--er);margin-left:.2rem;font-size:.8rem}
.search-results{background:var(--bg3);border:1px solid var(--br);border-radius:8px;max-height:160px;overflow-y:auto;margin-top:.3rem}
.search-result-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;cursor:pointer;transition:background .15s;font-size:.8rem}
.search-result-item:hover{background:rgba(255,255,255,.05)}
.search-result-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0}
.info{padding:.6rem .85rem;border-radius:8px;font-size:.75rem;margin-bottom:.75rem}
.info-blue{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--bl)}
.spin{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.1);border-top-color:var(--hi);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
#toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.tb-btn{background:var(--bg3);border:1px solid var(--br);border-radius:8px;padding:.38rem .6rem;cursor:pointer;color:var(--tx2);font-size:.85rem;transition:all .2s}
.tb-btn:hover{border-color:var(--hi);color:var(--hi)}
.tab-bar{display:flex;border-bottom:1px solid var(--br);padding:0 1rem}
.tab{padding:.55rem .9rem;font-size:.78rem;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--hi);border-bottom-color:var(--hi);font-weight:600}
.compose-file-zone{border:2px dashed var(--br);border-radius:8px;padding:1rem;text-align:center;cursor:pointer;transition:all .2s;font-size:.78rem;color:var(--tx3)}
.compose-file-zone:hover,.compose-file-zone.drag{border-color:var(--hi);background:rgba(255,107,0,.05);color:var(--hi)}
.file-attached{display:flex;align-items:center;gap:.5rem;background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.2);border-radius:8px;padding:.45rem .75rem;font-size:.75rem;margin-top:.4rem}
.file-attached .rm{cursor:pointer;color:var(--er);margin-left:auto}
@media(max-width:768px){
.sb{display:none}
.panel-left{width:240px}
}
@media(max-width:600px){
.panel-left{width:200px}
.mail-preview{display:none}
}
</style>
</head>
<body>
<div id="sb-overlay" onclick="closeSb()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99"></div>
<div class="shell">
<aside class="sb" id="sb">
  <div class="sb-logo">
    <div class="sb-title">GIDDIES EXPRESS</div>
    <div class="sb-sub">Comms Centre</div>
  </div>
  <div class="sb-user">
    <div class="sb-av" id="sbAv">??</div>
    <div><div class="sb-nm" id="sbName">Loading...</div><div class="sb-rl" id="sbRole">--</div></div>
  </div>
  <nav class="sb-nav">
    <div class="nav-sec">Messaging</div>
    <div class="nav-a on" id="nav-chat" onclick="switchMode('chat')"><span class="nav-ic">&#x1f4ac;</span>Chat</div>
    <div class="nav-a" id="nav-mail" onclick="switchMode('mail')"><span class="nav-ic">&#x1f4e7;</span>Mail<span class="nav-badge" id="mailBadge" style="display:none">0</span></div>
  </nav>
  <div class="sb-foot">
    <button class="btn-back" onclick="goBack()">&#x2190; Back to Portal</button>
    <button class="btn-logout" onclick="gxLogout()">&#x1f6aa; Sign Out</button>
  </div>
</aside>

<div class="main" id="mainArea">
  <div style="display:flex;align-items:center;justify-content:center;width:100%;flex-direction:column;gap:1rem;height:100%">
    <div class="spin" style="width:36px;height:36px"></div>
    <div style="color:var(--tx3);font-size:.85rem">Authenticating...</div>
  </div>
</div>
</div>
</div>

<div id="toasts"></div>

<div class="overlay" id="mNewChat">
<div class="modal">
  <div class="m-hd"><div class="m-title">&#x1f4ac; New Conversation</div><button class="m-x" onclick="closeModal('mNewChat')">&#x2715;</button></div>
  <div class="m-body">
    <div style="display:flex;gap:.5rem;margin-bottom:.85rem">
      <button class="btn btn-hi" id="tabDirect" onclick="setChatType('direct')" style="flex:1">Direct</button>
      <button class="btn btn-gh" id="tabGroup" onclick="setChatType('group')" style="flex:1">Group</button>
    </div>
    <div id="groupNameRow" style="display:none" class="field"><label>Group Name</label><input id="nc-gname" placeholder="e.g. Finance Team"/></div>
    <div class="field">
      <label>Search People</label>
      <input id="nc-search" placeholder="Type name or department..." oninput="searchEmps(this.value,'nc-results','nc-chips')"/>
      <div class="search-results" id="nc-results" style="display:none"></div>
    </div>
    <div class="emp-picker" id="nc-chips"></div>
  </div>
  <div class="m-ft">
    <button class="btn btn-gh" onclick="closeModal('mNewChat')">Cancel</button>
    <button class="btn btn-hi" onclick="startConvo()">Start Chat</button>
  </div>
</div>
</div>

<div class="overlay" id="mCompose">
<div class="modal" style="max-width:560px">
  <div class="m-hd"><div class="m-title">&#x1f4e7; Compose Mail</div><button class="m-x" onclick="closeModal('mCompose')">&#x2715;</button></div>
  <div class="m-body">
    <div class="field">
      <label>To *</label>
      <input id="cm-search" placeholder="Search recipient..." oninput="searchEmps(this.value,'cm-results','cm-chips',true)"/>
      <div class="search-results" id="cm-results" style="display:none"></div>
      <div class="emp-picker" id="cm-chips"></div>
    </div>
    <div class="field"><label>Subject *</label><input id="cm-subject" placeholder="Mail subject"/></div>
    <div class="field"><label>Message</label><textarea id="cm-body" rows="5" placeholder="Write your message here..."></textarea></div>
    <div class="field">
      <label>Attach File (optional)</label>
      <div class="compose-file-zone" id="cm-dropzone" onclick="document.getElementById('cm-file').click()" ondragover="e=event;e.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleComposeDrop(event)">
        &#x1f4ce; Click or drag & drop a file here
      </div>
      <input type="file" id="cm-file" style="display:none" onchange="handleComposeFile(this)"/>
      <div id="cm-file-preview" style="display:none" class="file-attached">
        <span>&#x1f4ce;</span><span id="cm-file-name"></span><span id="cm-file-size" style="color:var(--tx3);margin-left:.3rem"></span>
        <span class="rm" onclick="clearComposeFile()">&#x2715;</span>
      </div>
    </div>
    <input type="hidden" id="cm-reply-to"/>
  </div>
  <div class="m-ft">
    <button class="btn btn-gh" onclick="closeModal('mCompose')">Cancel</button>
    <button class="btn btn-hi" id="cm-btn" onclick="sendMail()">&#x27a4; Send Mail</button>
  </div>
</div>
</div>

<script>
var API='https://web-production-50873.up.railway.app';
var ME=null,TOKEN=null;
var currentMode='chat';
var currentConvoId=null;
var currentMailId=null;
var currentMailFolder='inbox';
var chatNewType='direct';
var ncSelectedEmps=[];
var cmSelectedEmp=null;
var cmFileData=null,cmFileName='',cmFileMime='',cmFileSize=0;
var chatFileData=null,chatFileName='',chatFileMime='',chatFileSize=0;
var chatPollingTimer=null;
var lastMsgCount=0;

function init(){
  TOKEN=sessionStorage.getItem('gx_token');
  var userStr=sessionStorage.getItem('gx_user');
  if(!TOKEN||!userStr){window.location.href='giddyexpress-login.html';return;}
  ME=JSON.parse(userStr);
  api('GET','/api/auth/verify-role?required_role=employee,dept_manager,manager,admin')
  .then(function(d){
    ME=d.user;
    var av=document.getElementById('sbAv');
    var nm=document.getElementById('sbName');
    var rl=document.getElementById('sbRole');
    if(av){av.textContent=inits(ME.name||'?');av.style.background=ME.color||'#FF6B00';}
    if(nm)nm.textContent=ME.name||'User';
    if(rl)rl.textContent=(ME.role||'').replace(/_/g,' ');
    checkMailBadge();
    switchMode('chat');
  }).catch(function(e){
    if(e.message&&e.message.indexOf('403')>-1){
      toast('Access denied: '+e.message,'er');
    } else {
      sessionStorage.clear();
      window.location.href='giddyexpress-login.html?reason='+encodeURIComponent(e.message||'Session expired');
    }
  });
}

function api(method,path,body){
  var opts={method:method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+(TOKEN||'')}};
  if(body)opts.body=JSON.stringify(body);
  return fetch(API+path,opts).then(function(r){
    return r.json().then(function(d){
      if(!r.ok)throw new Error(d.detail||'Request failed');
      return d;
    });
  });
}

function gxLogout(){
  api('POST','/api/auth/logout').catch(function(){});
  sessionStorage.clear();
  window.location.href='giddyexpress-login.html';
}

function goBack(){
  var role=ME&&ME.role?ME.role:'employee';
  var dept=ME&&ME.department?ME.department:'';
  if(role==='admin')window.location.href='giddyexpress-admin.html';
  else if(role==='manager')window.location.href='giddyexpress-manager.html';
  else if(role==='dept_manager'){
    var dmap={'HR':'giddyexpress-hr.html','Finance':'giddyexpress-finance.html','IT Support':'giddyexpress-it.html','Payroll':'giddyexpress-payroll.html'};
    window.location.href=dmap[dept]||'giddyexpress-manager.html';
  } else window.location.href='giddyexpress-employee.html';
}

function inits(n){return(n||'?').split(' ').map(function(c){return c[0]||'';}).join('').slice(0,2).toUpperCase();}
function avc(n){var c=['#FF6B00','#F472B6','#60A5FA','#4ADE80','#A78BFA','#FB923C'];var h=0;for(var i=0;i<(n||'').length;i++)h=(n.charCodeAt(i)+((h<<5)-h));return c[Math.abs(h)%c.length];}
function av(n,sz,round){var s=sz||'32px';var br=round===false?'10px':'50%';return '<div style="width:'+s+';height:'+s+';border-radius:'+br+';background:'+avc(n)+';display:flex;align-items:center;justify-content:center;font-size:calc('+s+' * 0.35);font-weight:700;color:#fff;flex-shrink:0">'+inits(n)+'</div>';}
function ago(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'now';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}
function fmtDate(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'});}
function fmtTime(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'});}
function fmtFileSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
function fileIcon(mime){if(!mime)return'📎';if(mime.startsWith('image'))return'🖼️';if(mime.includes('pdf'))return'📄';if(mime.includes('word')||mime.includes('document'))return'📝';if(mime.includes('sheet')||mime.includes('excel'))return'📊';if(mime.includes('zip')||mime.includes('rar'))return'🗜️';if(mime.startsWith('video'))return'🎬';if(mime.startsWith('audio'))return'🎵';return'📎';}

function toast(msg,type){
  var w=document.getElementById('toasts');
  var c={ok:'#4ADE80',er:'#FCA5A5',wa:'#FCD34D',in:'#93C5FD'};
  var b={ok:'rgba(34,197,94,.3)',er:'rgba(239,68,68,.3)',wa:'rgba(245,158,11,.3)',in:'rgba(96,165,250,.3)'};
  var t=document.createElement('div');
  t.style.cssText='background:#1A1D24;border:1px solid '+(b[type]||b.in)+';color:'+(c[type]||c.in)+';padding:.6rem 1rem;border-radius:100px;font-size:.75rem;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.4);transform:translateX(110%);transition:transform .28s;font-family:DM Sans,sans-serif;max-width:300px';
  t.textContent=msg;w.appendChild(t);
  setTimeout(function(){t.style.transform='translateX(0)';},10);
  setTimeout(function(){t.style.transform='translateX(110%)';setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},300);},3800);
}

function openModal(id){var e=document.getElementById(id);if(e)e.classList.add('open');}
function closeModal(id){var e=document.getElementById(id);if(e)e.classList.remove('open');}
document.addEventListener('click',function(e){if(e.target&&e.target.classList.contains('overlay'))e.target.classList.remove('open');});

function switchMode(mode){
  currentMode=mode;
  if(chatPollingTimer){clearInterval(chatPollingTimer);chatPollingTimer=null;}
  document.getElementById('nav-chat').classList.toggle('on',mode==='chat');
  document.getElementById('nav-mail').classList.toggle('on',mode==='mail');
  if(mode==='chat')renderChatMode();
  else renderMailMode();
}

function checkMailBadge(){
  api('GET','/api/mail/unread-count').then(function(d){
    var b=document.getElementById('mailBadge');
    if(!b)return;
    if((d.count||0)>0){b.textContent=d.count;b.style.display='inline-block';}
    else b.style.display='none';
  }).catch(function(){});
}

function renderChatMode(){
  var ma=document.getElementById('mainArea');
  ma.innerHTML='';
  var pl=document.createElement('div');pl.className='panel-left';
  var hd=document.createElement('div');hd.className='panel-hd';
  hd.innerHTML='<div class="panel-title">&#x1f4ac; Chats</div>';
  var nb=document.createElement('button');nb.className='new-btn';nb.innerHTML='&#x2b; New';nb.onclick=function(){openNewChatModal();};
  hd.appendChild(nb);pl.appendChild(hd);
  var sr=document.createElement('div');sr.className='panel-search';
  sr.innerHTML='<input placeholder="Search conversations..." oninput="filterConvos(this.value)"/>';
  pl.appendChild(sr);
  var list=document.createElement('div');list.className='panel-list';list.id='convList';
  list.innerHTML='<div style="padding:2rem;text-align:center"><div class="spin"></div></div>';
  pl.appendChild(list);
  var ca=document.createElement('div');ca.className='chat-area';ca.id='chatArea';
  ca.innerHTML='<div class="empty-state"><div class="empty-ic">&#x1f4ac;</div><div class="empty-title">Select a conversation</div><div class="empty-sub">Pick an existing chat or start a new one</div></div>';
  ma.appendChild(pl);ma.appendChild(ca);
  loadConvos();
}

var allConvos=[];
function loadConvos(){
  api('GET','/api/chat/conversations').then(function(rows){
    allConvos=rows;
    renderConvoList(rows);
  }).catch(function(e){
    var el=document.getElementById('convList');
    if(el)el.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--er);font-size:.78rem">'+e.message+'</div>';
  });
}

function filterConvos(q){
  if(!q)return renderConvoList(allConvos);
  renderConvoList(allConvos.filter(function(c){return getConvoName(c).toLowerCase().includes(q.toLowerCase());}));
}

function getConvoName(c){
  if(c.type==='group')return c.name||'Group Chat';
  var other=c.members&&c.members.find(function(m){return m.employee_id!==getMyEmpId();});
  return other?other.employee_name:'Chat';
}

var myEmpId=null;
function getMyEmpId(){
  if(myEmpId)return myEmpId;
  return null;
}

function renderConvoList(rows){
  var el=document.getElementById('convList');if(!el)return;el.innerHTML='';
  if(!rows||!rows.length){
    el.innerHTML='<div style="padding:2rem;text-align:center;color:var(--tx3);font-size:.78rem">No conversations yet.<br>Start a new chat!</div>';
    return;
  }
  rows.forEach(function(c){
    var item=document.createElement('div');item.className='conv-item'+(currentConvoId===c.id?' active':'');
    var name=getConvoName(c);
    var isGroup=c.type==='group';
    var col=avc(name);
    var avEl=document.createElement('div');avEl.className='conv-av'+(isGroup?' group':'');avEl.style.background=col;
    avEl.textContent=isGroup?'&#x1f465;':inits(name);
    if(isGroup)avEl.innerHTML='<span style="font-size:.9rem">&#x1f465;</span>';
    item.appendChild(avEl);
    var info=document.createElement('div');info.className='conv-info';
    var nm=document.createElement('div');nm.className='conv-name';nm.textContent=name;info.appendChild(nm);
    if(c.last_message){var pv=document.createElement('div');pv.className='conv-preview';pv.textContent=c.last_message;info.appendChild(pv);}
    item.appendChild(info);
    var meta=document.createElement('div');meta.className='conv-meta';
    var tm=document.createElement('div');tm.className='conv-time';tm.textContent=c.last_at?ago(c.last_at):'';meta.appendChild(tm);
    item.appendChild(meta);
    (function(cid){item.onclick=function(){openConvo(cid);};})(c.id);
    el.appendChild(item);
  });
}

function openConvo(cid){
  currentConvoId=cid;
  renderConvoList(allConvos);
  var convo=allConvos.find(function(c){return c.id===cid;});
  if(!convo)return;
  var name=getConvoName(convo);
  var isGroup=convo.type==='group';
  var members=convo.members||[];
  var memberStr=isGroup?(members.length+' members'):'';
  var ca=document.getElementById('chatArea');if(!ca)return;
  ca.innerHTML='';
  var hd=document.createElement('div');hd.className='chat-hd';
  var hav=document.createElement('div');hav.className='chat-hd-av';hav.style.background=avc(name);
  if(isGroup)hav.innerHTML='<span style="font-size:.9rem">&#x1f465;</span>';else hav.textContent=inits(name);
  hd.appendChild(hav);
  var hi=document.createElement('div');
  var hn=document.createElement('div');hn.className='chat-hd-name';hn.textContent=name;hi.appendChild(hn);
  if(memberStr){var hs=document.createElement('div');hs.className='chat-hd-sub';hs.textContent=memberStr;hi.appendChild(hs);}
  hd.appendChild(hi);
  ca.appendChild(hd);
  var msgs=document.createElement('div');msgs.className='chat-msgs';msgs.id='chatMsgs';
  msgs.innerHTML='<div style="display:flex;justify-content:center;padding:2rem"><div class="spin"></div></div>';
  ca.appendChild(msgs);
  var inp=document.createElement('div');inp.className='chat-input';inp.id='chatInput';
  var fp=document.createElement('div');fp.id='chatFilePrev';fp.style.display='none';fp.className='input-file-preview';
  fp.innerHTML='<span id="chatFileIcon">&#x1f4ce;</span> <span id="chatFileName"></span><span id="chatFileSize" style="color:var(--tx3);margin-left:.3rem"></span><span class="rm" onclick="clearChatFile()">&#x2715;</span>';
  inp.appendChild(fp);
  var row=document.createElement('div');row.className='input-row';
  var fileBtn=document.createElement('div');fileBtn.className='ic-btn';fileBtn.innerHTML='&#x1f4ce;';fileBtn.title='Attach file';
  fileBtn.onclick=function(){document.getElementById('chatFileInput').click();};
  var fileInp=document.createElement('input');fileInp.type='file';fileInp.id='chatFileInput';fileInp.style.display='none';
  fileInp.onchange=function(){handleChatFile(this);};
  var ta=document.createElement('textarea');ta.id='chatTxt';ta.placeholder='Type a message...';ta.rows=1;
  ta.oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';};
  ta.onkeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMsg();}};
  var sendBtn=document.createElement('div');sendBtn.className='ic-btn send';sendBtn.innerHTML='&#x27a4;';sendBtn.onclick=sendChatMsg;
  row.appendChild(fileBtn);row.appendChild(fileInp);row.appendChild(ta);row.appendChild(sendBtn);
  inp.appendChild(row);ca.appendChild(inp);
  loadChatMsgs(cid);
  if(chatPollingTimer)clearInterval(chatPollingTimer);
  chatPollingTimer=setInterval(function(){if(currentConvoId===cid)loadChatMsgs(cid,true);},4000);
}

function loadChatMsgs(cid,silent){
  api('GET','/api/chat/conversations/'+cid+'/messages').then(function(msgs){
    var el=document.getElementById('chatMsgs');if(!el)return;
    var wasAtBottom=el.scrollHeight-el.scrollTop-el.clientHeight<60;
    if(!silent)el.innerHTML='';
    if(msgs.length===el.querySelectorAll('.msg-row,.msg-date-sep').length&&silent)return;
    el.innerHTML='';
    var lastDate='';
    msgs.forEach(function(m){
      var d=m.created_at?m.created_at.slice(0,10):'';
      if(d&&d!==lastDate){
        lastDate=d;
        var sep=document.createElement('div');sep.className='msg-date-sep';sep.innerHTML='<span>'+fmtDate(m.created_at)+'</span>';el.appendChild(sep);
      }
      var isMine=m.sender_id===getMyEmpIdDirect();
      var row=document.createElement('div');row.className='msg-row'+(isMine?' mine':'');
      if(!isMine){var sm=document.createElement('div');sm.className='msg-av-sm';sm.style.background=m.sender_color||avc(m.sender_name||'');sm.textContent=inits(m.sender_name||'');row.appendChild(sm);}
      var bub=document.createElement('div');bub.className='msg-bubble';
      if(m.is_deleted){var del=document.createElement('div');del.className='msg-deleted';del.textContent='This message was deleted';bub.appendChild(del);}
      else{
        if(!isMine&&msgs.some(function(x){return x.sender_id!==m.sender_id;})){var sn=document.createElement('div');sn.className='msg-sender';sn.textContent=m.sender_name||'';sn.style.color=m.sender_color||avc(m.sender_name||'');bub.appendChild(sn);}
        if(m.content&&m.msg_type==='text'){var txt=document.createElement('div');txt.className='msg-text';txt.textContent=m.content;bub.appendChild(txt);}
        if(m.file_name&&m.file_data){
          var fa=document.createElement('a');fa.className='msg-file';fa.href='#';
          (function(fd,fn,fm){fa.onclick=function(e){e.preventDefault();downloadFile(fd,fn,fm);};})(m.file_data,m.file_name,m.file_mime);
          fa.innerHTML='<div class="msg-file-ic">'+fileIcon(m.file_mime)+'</div><div class="msg-file-info"><div class="msg-file-name">'+m.file_name+'</div><div class="msg-file-size">'+fmtFileSize(m.file_size)+'</div></div><span style="color:var(--bl);font-size:.72rem">Download</span>';
          if(m.content){var ct=document.createElement('div');ct.className='msg-text';ct.textContent=m.content;ct.style.marginBottom='.35rem';bub.appendChild(ct);}
          bub.appendChild(fa);
        } else if(m.file_name&&m.msg_type==='file'){
          var fa2=document.createElement('div');fa2.className='msg-file';
          fa2.innerHTML='<div class="msg-file-ic">'+fileIcon(m.file_mime)+'</div><div class="msg-file-info"><div class="msg-file-name">'+m.file_name+'</div><div class="msg-file-size">'+fmtFileSize(m.file_size)+' (no data)</div></div>';
          bub.appendChild(fa2);
        }
        var tm=document.createElement('div');tm.className='msg-time';
        tm.textContent=fmtTime(m.created_at);
        if(isMine){
          var delBtn=document.createElement('span');delBtn.style.cssText='cursor:pointer;color:var(--er);margin-left:.5rem;font-size:.65rem';delBtn.textContent='delete';
          (function(mid){delBtn.onclick=function(){if(confirm('Delete this message?'))api('DELETE','/api/chat/messages/'+mid).then(function(){loadChatMsgs(cid);}).catch(function(e){toast(e.message,'er');});};})(m.id);
          tm.appendChild(delBtn);
        }
        bub.appendChild(tm);
      }
      row.appendChild(bub);el.appendChild(row);
    });
    if(!silent||wasAtBottom)el.scrollTop=el.scrollHeight;
  }).catch(function(e){if(!silent){var el=document.getElementById('chatMsgs');if(el)el.innerHTML='<div style="padding:2rem;text-align:center;color:var(--er);font-size:.78rem">'+e.message+'</div>';}});
}

function getMyEmpIdDirect(){
  if(myEmpId)return myEmpId;
  var convo=allConvos&&allConvos.find(function(c){return c.id===currentConvoId;});
  if(convo&&convo.members&&ME){
    var me=convo.members.find(function(m){return m.employee_name===ME.name;});
    if(me){myEmpId=me.employee_id;return myEmpId;}
  }
  return '__unknown__';
}

function sendChatMsg(){
  var ta=document.getElementById('chatTxt');if(!ta)return;
  var txt=(ta.value||'').trim();
  if(!txt&&!chatFileData){toast('Type a message or attach a file','wa');return;}
  if(!currentConvoId)return;
  var body={content:txt,msg_type:chatFileData?'file':'text'};
  if(chatFileData){body.file_data=chatFileData;body.file_name=chatFileName;body.file_mime=chatFileMime;body.file_size=chatFileSize;}
  api('POST','/api/chat/conversations/'+currentConvoId+'/messages',body)
  .then(function(){
    ta.value='';ta.style.height='auto';
    clearChatFile();
    loadChatMsgs(currentConvoId);
    loadConvos();
  }).catch(function(e){toast('Failed: '+e.message,'er');});
}

function handleChatFile(input){
  var file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('File must be under 5MB','er');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    chatFileData=e.target.result.split(',')[1];
    chatFileName=file.name;chatFileMime=file.type;chatFileSize=file.size;
    var prev=document.getElementById('chatFilePrev');
    var fn=document.getElementById('chatFileName');
    var fs=document.getElementById('chatFileSize');
    var fi=document.getElementById('chatFileIcon');
    if(prev){prev.style.display='flex';}
    if(fn)fn.textContent=file.name;
    if(fs)fs.textContent=fmtFileSize(file.size);
    if(fi)fi.textContent=fileIcon(file.type);
  };
  reader.readAsDataURL(file);
}

function clearChatFile(){
  chatFileData=null;chatFileName='';chatFileMime='';chatFileSize=0;
  var prev=document.getElementById('chatFilePrev');if(prev)prev.style.display='none';
  var inp=document.getElementById('chatFileInput');if(inp)inp.value='';
}

function downloadFile(data,name,mime){
  var b64=data.includes(',')?data:('data:'+(mime||'application/octet-stream')+';base64,'+data);
  var a=document.createElement('a');a.href=b64;a.download=name||'file';a.click();
}

function setChatType(t){
  chatNewType=t;
  document.getElementById('tabDirect').className=t==='direct'?'btn btn-hi':'btn btn-gh';
  document.getElementById('tabGroup').className=t==='group'?'btn btn-hi':'btn btn-gh';
  document.getElementById('groupNameRow').style.display=t==='group'?'':'none';
  if(t==='direct'){ncSelectedEmps=ncSelectedEmps.slice(0,1);renderNcChips();}
}

function openNewChatModal(){
  ncSelectedEmps=[];
  document.getElementById('nc-chips').innerHTML='';
  document.getElementById('nc-results').style.display='none';
  document.getElementById('nc-search').value='';
  document.getElementById('nc-gname').value='';
  setChatType('direct');
  openModal('mNewChat');
}

function searchEmps(q,resultsId,chipsId,single){
  var el=document.getElementById(resultsId);if(!el)return;
  if(!q||q.length<2){el.style.display='none';el.innerHTML='';return;}
  api('GET','/api/chat/employees?q='+encodeURIComponent(q)).then(function(emps){
    el.innerHTML='';
    if(!emps.length){el.innerHTML='<div style="padding:.75rem;font-size:.75rem;color:var(--tx3)">No results</div>';el.style.display='block';return;}
    emps.forEach(function(e){
      var already=(chipsId==='nc-chips'?ncSelectedEmps:[cmSelectedEmp]).find(function(x){return x&&x.id===e.id;});
      if(already)return;
      var item=document.createElement('div');item.className='search-result-item';
      item.innerHTML='<div class="search-result-av" style="background:'+avc(e.name)+'">'+inits(e.name)+'</div><div><div style="font-size:.8rem;font-weight:500">'+e.name+'</div><div style="font-size:.67rem;color:var(--tx3)">'+e.department+'</div></div>';
      (function(emp){item.onclick=function(){
        if(chipsId==='nc-chips'){
          if(chatNewType==='direct')ncSelectedEmps=[emp];else ncSelectedEmps.push(emp);
          renderNcChips();
        } else {
          cmSelectedEmp=emp;renderCmChip();
        }
        el.style.display='none';el.innerHTML='';
        var si=document.getElementById(chipsId==='nc-chips'?'nc-search':'cm-search');if(si)si.value='';
      };})(e);
      el.appendChild(item);
    });
    el.style.display='block';
  }).catch(function(){el.style.display='none';});
}

function renderNcChips(){
  var el=document.getElementById('nc-chips');if(!el)return;el.innerHTML='';
  ncSelectedEmps.forEach(function(e,i){
    var chip=document.createElement('div');chip.className='emp-chip';
    chip.innerHTML='<div class="emp-chip-av" style="background:'+avc(e.name)+'">'+inits(e.name)+'</div><span>'+e.name+'</span>';
    var rm=document.createElement('span');rm.className='emp-chip-rm';rm.textContent='×';
    (function(idx){rm.onclick=function(){ncSelectedEmps.splice(idx,1);renderNcChips();};})(i);
    chip.appendChild(rm);el.appendChild(chip);
  });
}

function renderCmChip(){
  var el=document.getElementById('cm-chips');if(!el)return;el.innerHTML='';
  if(!cmSelectedEmp)return;
  var chip=document.createElement('div');chip.className='emp-chip';
  chip.innerHTML='<div class="emp-chip-av" style="background:'+avc(cmSelectedEmp.name)+'">'+inits(cmSelectedEmp.name)+'</div><span>'+cmSelectedEmp.name+'</span><span style="font-size:.65rem;color:var(--tx3);margin-left:.2rem">('+cmSelectedEmp.department+')</span>';
  var rm=document.createElement('span');rm.className='emp-chip-rm';rm.textContent='×';rm.onclick=function(){cmSelectedEmp=null;el.innerHTML='';};
  chip.appendChild(rm);el.appendChild(chip);
}

function startConvo(){
  if(!ncSelectedEmps.length){toast('Select at least one person','er');return;}
  var name=document.getElementById('nc-gname').value.trim();
  if(chatNewType==='group'&&!name){toast('Enter a group name','er');return;}
  var ids=ncSelectedEmps.map(function(e){return e.id;});
  api('POST','/api/chat/conversations',{type:chatNewType,name:name,member_ids:ids})
  .then(function(r){
    closeModal('mNewChat');
    loadConvos();
    setTimeout(function(){openConvo(r.id);},400);
    toast(r.existing?'Opened existing chat':'Conversation started','ok');
  }).catch(function(e){toast(e.message,'er');});
}

function renderMailMode(){
  var ma=document.getElementById('mainArea');ma.innerHTML='';
  var pl=document.createElement('div');pl.className='panel-left';pl.style.width='260px';
  var hd=document.createElement('div');hd.className='panel-hd';
  hd.innerHTML='<div class="panel-title">&#x1f4e7; Mail</div>';
  var nb=document.createElement('button');nb.className='new-btn';nb.innerHTML='&#x270f; Compose';nb.onclick=openCompose;
  hd.appendChild(nb);pl.appendChild(hd);
  var tabs=document.createElement('div');tabs.className='tab-bar';
  [['inbox','Inbox'],['sent','Sent']].forEach(function(t){
    var tab=document.createElement('div');tab.className='tab'+(currentMailFolder===t[0]?' on':'');tab.textContent=t[1];
    (function(f){tab.onclick=function(){currentMailFolder=f;tabs.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});tab.classList.add('on');loadMailList();};})(t[0]);
    tabs.appendChild(tab);
  });
  pl.appendChild(tabs);
  var sr=document.createElement('div');sr.className='panel-search';
  sr.innerHTML='<input placeholder="Search mail..." oninput="filterMail(this.value)"/>';
  pl.appendChild(sr);
  var list=document.createElement('div');list.className='panel-list';list.id='mailList';
  list.innerHTML='<div style="padding:2rem;text-align:center"><div class="spin"></div></div>';
  pl.appendChild(list);
  var ma2=document.createElement('div');ma2.className='mail-area';
  ma2.innerHTML='<div class="empty-state"><div class="empty-ic">&#x1f4e7;</div><div class="empty-title">Select a mail</div><div class="empty-sub">Click any mail to read it, or compose a new one</div></div>';
  ma2.id='mailDetail';
  ma.appendChild(pl);ma.appendChild(ma2);
  loadMailList();
  checkMailBadge();
}

var allMails=[];
function loadMailList(){
  var ep=currentMailFolder==='inbox'?'/api/mail/inbox':'/api/mail/sent';
  api('GET',ep).then(function(rows){
    allMails=rows;renderMailList(rows);
  }).catch(function(e){var el=document.getElementById('mailList');if(el)el.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--er);font-size:.78rem">'+e.message+'</div>';});
}

function filterMail(q){
  if(!q)return renderMailList(allMails);
  renderMailList(allMails.filter(function(m){return (m.subject||'').toLowerCase().includes(q.toLowerCase())||(m.from_name||'').toLowerCase().includes(q.toLowerCase())||(m.to_name||'').toLowerCase().includes(q.toLowerCase());}));
}

function renderMailList(rows){
  var el=document.getElementById('mailList');if(!el)return;el.innerHTML='';
  if(!rows||!rows.length){el.innerHTML='<div style="padding:2rem;text-align:center;color:var(--tx3);font-size:.78rem">No mail found</div>';return;}
  rows.forEach(function(m){
    var isInbox=currentMailFolder==='inbox';
    var item=document.createElement('div');
    item.className='mail-item'+(currentMailId===m.id?' active':'')+((!m.is_read&&isInbox)?' unread':'');
    var name=isInbox?(m.from_name||'?'):(m.to_name||'?');
    var avEl=document.createElement('div');avEl.className='mail-av';avEl.style.background=avc(name);avEl.textContent=inits(name);item.appendChild(avEl);
    var info=document.createElement('div');info.className='mail-info';
    var fn=document.createElement('div');fn.className='mail-from';fn.textContent=name;info.appendChild(fn);
    var sb=document.createElement('div');sb.className='mail-subj';
    sb.innerHTML=(m.file_name?'<span style="color:var(--bl)">&#x1f4ce; </span>':'')+m.subject;info.appendChild(sb);
    if(m.body){var pv=document.createElement('div');pv.className='mail-preview';pv.textContent=m.body.slice(0,80);info.appendChild(pv);}
    item.appendChild(info);
    var meta=document.createElement('div');meta.className='mail-meta';
    var tm=document.createElement('div');tm.className='mail-time';tm.textContent=ago(m.created_at);meta.appendChild(tm);
    var star=document.createElement('div');star.className='star '+(m.is_starred?'on':'off');star.textContent='★';
    (function(mid,s){star.onclick=function(e){e.stopPropagation();api('PATCH','/api/mail/'+mid+'/star').then(function(){s.className='star '+(s.classList.contains('off')?'on':'off');}).catch(function(){});};})(m.id,star);
    meta.appendChild(star);item.appendChild(meta);
    (function(mid){item.onclick=function(){openMail(mid);};})(m.id);
    el.appendChild(item);
  });
}

function openMail(id){
  currentMailId=id;
  var det=document.getElementById('mailDetail');if(!det)return;
  det.innerHTML='<div style="display:flex;justify-content:center;padding:3rem"><div class="spin"></div></div>';
  api('GET','/api/mail/'+id).then(function(m){
    renderMailDetail(m,det);
    var item=document.querySelector('.mail-item.active');
    document.querySelectorAll('.mail-item').forEach(function(x){x.classList.toggle('active',x===item);});
    renderMailList(allMails);
    checkMailBadge();
  }).catch(function(e){det.innerHTML='<div style="padding:2rem;color:var(--er);font-size:.8rem">'+e.message+'</div>';});
}

function renderMailDetail(m,container){
  container.innerHTML='';
  var isInbox=currentMailFolder==='inbox';
  var name=isInbox?(m.from_name||'?'):(m.to_name||'?');
  var wrap=document.createElement('div');wrap.className='mail-detail';
  var mhd=document.createElement('div');mhd.className='mail-detail-hd';
  var subj=document.createElement('div');subj.className='mail-detail-subj';subj.textContent=m.subject;mhd.appendChild(subj);
  var meta=document.createElement('div');meta.className='mail-detail-meta';
  var dav=document.createElement('div');dav.className='mail-detail-av';dav.style.background=avc(name);dav.textContent=inits(name);meta.appendChild(dav);
  var dfr=document.createElement('div');dfr.className='mail-detail-from';
  var dnm=document.createElement('div');dnm.className='mail-detail-name';dnm.textContent=m.from_name||(isInbox?'Unknown':'You');dfr.appendChild(dnm);
  var dto=document.createElement('div');dto.className='mail-detail-to';dto.textContent='To: '+(m.to_name||'?')+' • '+new Date(m.created_at).toLocaleString('en-NG');dfr.appendChild(dto);
  meta.appendChild(dfr);
  mhd.appendChild(meta);wrap.appendChild(mhd);
  var body=document.createElement('div');body.className='mail-detail-body';body.textContent=m.body||'';wrap.appendChild(body);
  if(m.file_name&&m.file_data){
    var atc=document.createElement('a');atc.className='mail-detail-attach';atc.href='#';
    (function(fd,fn,fm){atc.onclick=function(e){e.preventDefault();downloadFile(fd,fn,fm);};})(m.file_data,m.file_name,m.file_mime);
    atc.innerHTML='<span style="font-size:1.3rem">'+fileIcon(m.file_mime)+'</span><div><div style="font-size:.8rem;font-weight:600">'+m.file_name+'</div><div style="font-size:.65rem;color:var(--tx3)">'+fmtFileSize(m.file_size)+'</div></div><span style="color:var(--bl);font-size:.72rem;margin-left:.5rem">Download</span>';
    wrap.appendChild(atc);
  }
  var acts=document.createElement('div');acts.className='mail-actions';
  if(isInbox){
    var rep=document.createElement('button');rep.className='btn btn-hi';rep.innerHTML='&#x21a9; Reply';
    (function(mail){rep.onclick=function(){openReply(mail);};})(m);acts.appendChild(rep);
  }
  var del=document.createElement('button');del.className='btn btn-er';del.innerHTML='&#x1f5d1; Delete';
  (function(mid){del.onclick=function(){if(!confirm('Delete this mail?'))return;api('DELETE','/api/mail/'+mid).then(function(){currentMailId=null;loadMailList();var det2=document.getElementById('mailDetail');if(det2)det2.innerHTML='<div class="empty-state"><div class="empty-ic">&#x1f4e7;</div><div class="empty-title">Mail deleted</div></div>';toast('Mail deleted','ok');}).catch(function(e){toast(e.message,'er');});};})(m.id);
  acts.appendChild(del);wrap.appendChild(acts);
  container.appendChild(wrap);
}

function openReply(mail){
  document.getElementById('cm-reply-to').value=mail.id;
  cmSelectedEmp={id:mail.from_id,name:mail.from_name,department:''};
  renderCmChip();
  document.getElementById('cm-subject').value='Re: '+mail.subject;
  document.getElementById('cm-body').value='';
  openModal('mCompose');
}

function openCompose(toEmp){
  cmSelectedEmp=toEmp||null;
  document.getElementById('cm-chips').innerHTML='';
  document.getElementById('cm-search').value='';
  document.getElementById('cm-subject').value='';
  document.getElementById('cm-body').value='';
  document.getElementById('cm-reply-to').value='';
  clearComposeFile();
  if(toEmp)renderCmChip();
  openModal('mCompose');
}

function handleComposeFile(input){
  var file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('File must be under 5MB','er');input.value='';return;}
  var reader=new FileReader();
  reader.onload=function(e){
    cmFileData=e.target.result.split(',')[1];
    cmFileName=file.name;cmFileMime=file.type;cmFileSize=file.size;
    document.getElementById('cm-file-preview').style.display='flex';
    document.getElementById('cm-file-name').textContent=file.name;
    document.getElementById('cm-file-size').textContent=fmtFileSize(file.size);
  };
  reader.readAsDataURL(file);
}

function handleComposeDrop(e){
  e.preventDefault();document.getElementById('cm-dropzone').classList.remove('drag');
  var file=e.dataTransfer.files[0];if(!file)return;
  var inp=document.getElementById('cm-file');
  var dt=new DataTransfer();dt.items.add(file);inp.files=dt.files;
  handleComposeFile(inp);
}

function clearComposeFile(){
  cmFileData=null;cmFileName='';cmFileMime='';cmFileSize=0;
  document.getElementById('cm-file-preview').style.display='none';
  document.getElementById('cm-file').value='';
}

function sendMail(){
  if(!cmSelectedEmp){toast('Select a recipient','er');return;}
  var subj=document.getElementById('cm-subject').value.trim();
  var body=document.getElementById('cm-body').value.trim();
  var replyTo=document.getElementById('cm-reply-to').value;
  if(!subj){toast('Enter a subject','er');return;}
  var btn=document.getElementById('cm-btn');btn.disabled=true;btn.textContent='Sending...';
  var payload={to_id:cmSelectedEmp.id,subject:subj,body:body,reply_to:replyTo};
  if(cmFileData){payload.file_data=cmFileData;payload.file_name=cmFileName;payload.file_mime=cmFileMime;payload.file_size=cmFileSize;}
  api('POST','/api/mail/send',payload)
  .then(function(){
    btn.disabled=false;btn.textContent='&#x27a4; Send Mail';
    closeModal('mCompose');toast('Mail sent!','ok');
    cmSelectedEmp=null;clearComposeFile();
    if(currentMode==='mail')loadMailList();
  }).catch(function(e){btn.disabled=false;btn.textContent='&#x27a4; Send Mail';toast('Failed: '+e.message,'er');});
}

document.addEventListener('DOMContentLoaded',function(){init();});
</script>

</html>
